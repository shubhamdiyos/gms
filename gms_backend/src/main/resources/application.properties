spring.application.name=gms
server.port=${SERVER_PORT:8080}

# Database Configuration
spring.datasource.url=jdbc:postgresql://ep-lingering-haze-a1pz5nl2-pooler.ap-southeast-1.aws.neon.tech:5432/gms?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_lSICGOZc4LR2
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info

# Mail (SMTP) Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

# CORS Configuration
# Include local dev and deployed Vercel domains by default. For production, you can
# override this via the CORS_ALLOWED_ORIGINS environment variable.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://gms-react.vercel.app,https://gms-react-git-master-shubhamdiyos-projects.vercel.app}

# Security Enhancements
server.error.include-message=never
spring.jpa.open-in-view=false
spring.servlet.multipart.enabled=false

# Logging Configuration
logging.level.com.gms=${LOG_LEVEL_COM_GMS:DEBUG}
logging.level.com.gms.config.SuperAdminBootstrapRunner=${LOG_LEVEL_BOOTSTRAP:DEBUG}
logging.level.com.gms.service.bootstrap.SuperAdminBootstrapService=${LOG_LEVEL_BOOTSTRAP:DEBUG}