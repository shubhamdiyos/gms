spring.application.name=gms
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/gms
spring.datasource.username=gms_user
spring.datasource.password=gms_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration (disabled for local run due to version issue)
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

# Actuator
management.endpoints.web.exposure.include=health,info

